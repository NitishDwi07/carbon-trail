services:
  # Django backend
  - type: web
    name: breathe-esg-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn breathe_esg.wsgi:application"
    # After first deploy, run once via Render shell: python manage.py seed_demo
    rootDir: backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DB_NAME
        fromDatabase:
          name: breathe-esg-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: breathe-esg-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: breathe-esg-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: breathe-esg-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: breathe-esg-db
          property: port

  # React frontend (static site)
  - type: web
    name: breathe-esg-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: "https://breathe-esg-backend.onrender.com/api"

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_user
    plan: free
